server:
  port: 8080

spring:
  application:
    name: gondorgates-limiter
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8

gondorgates:
  policies:
    # 1. Strict Policy for Authentication
    - path: /api/login
      capacity: 5
      refillRate: 1

    # 2. Medium Policy for Orders
    - path: /api/orders
      capacity: 20
      refillRate: 5

    # 3. Test Policy for your Integration Test (GondorGatesWebFilterIT)
    - path: /api/test
      capacity: 10
      refillRate: 2

    # 4. Default Catch-all (Optional)
    - path: /
      capacity: 100
      refillRate: 10