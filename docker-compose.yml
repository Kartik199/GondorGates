services:
  gondor-redis:
    image: redis:7.2-alpine
    container_name: gondor-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--save", ""]
    volumes:
      - gondor_data:/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    networks:
      - gondor-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  gondor_data:

networks:
  gondor-network:
    driver: bridge